# Infra local de desenvolvimento: Postgres + Redis
#   docker compose up -d
# DATABASE_URL e REDIS_URL do .env.example já apontam para estes serviços.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: locacoes
      POSTGRES_PASSWORD: locacoes
      POSTGRES_DB: locacoes_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locacoes"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
